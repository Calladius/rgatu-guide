# Еженедельное обновление данных с сайта РГАТУ
# Запускается каждый понедельник в 06:00 UTC (09:00 МСК)
# Также можно запустить вручную

name: Обновление данных РГАТУ

on:
  schedule:
    - cron: '0 6 * * 1'  # Каждый понедельник в 06:00 UTC
  workflow_dispatch:       # Ручной запуск

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Клонирование репозитория
        uses: actions/checkout@v4

      - name: Установка Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: parser/package.json

      - name: Установка зависимостей парсера
        run: npm install
        working-directory: parser

      - name: Запуск парсера (только данные, без SVG)
        run: node parse.js --data-only
        working-directory: parser

      - name: Проверка изменений
        id: check_changes
        run: |
          if git diff --quiet src/data/; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "Нет изменений данных"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Обнаружены изменения:"
            git diff --stat src/data/
          fi

      - name: Коммит и пуш изменений
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "RGATU Parser Bot"
          git config user.email "parser-bot@rsatu-guide.local"
          git add src/data/
          git commit -m "🔄 Автообновление данных: $(date +%Y-%m-%d)"
          git push
